name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Rebuild native modules
        run: |
          cd frontend
          npx -y @electron/rebuild

      - name: Build and Publish Release
        run: |
          cd frontend
          npm run dist:${{ matrix.platform }} -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cursor-share-${{ matrix.platform }}
          path: |
            frontend/dist/*.dmg
            frontend/dist/*.exe
            frontend/dist/*.zip
          if-no-files-found: warn
